# Default values for frontend.
# Overridden per-cluster by clusters/<env>/ortelius/values.yaml (plain)
# and clusters/<env>/ortelius/secrets.enc.yaml (SOPS) in the platform repo.
#
# frontend has no secrets of its own — all sensitive values belong
# to ortelius and smtp.  This section is intentionally plain.

replicaCount: 1

image:
  repository: quay.io/ortelius/frontend
  tag: main-v10.0.92-g2eebd3
  pullPolicy: Always

# Runtime endpoints — set per-cluster in values.yaml
graphqlEndpoint: "https://app.deployhub.com/api/v1/graphql"
restapiEndpoint: "https://app.deployhub.com/api/v1"

ingress:
  # type: glb | alb | kind
  type: glb
  host: "app.deployhub.com"

  # GKE GLB — set in clusters/gke/ortelius/values.yaml
  staticIP: "static-app-ip"

  # AWS ALB — set in clusters/eks/ortelius/values.yaml
  # certificateArn and subnets come from Terraform outputs; they are
  # plain values (not secrets) so they live in values.yaml, not secrets.enc.yaml
  certificateArn: ""   # arn:aws:acm:<region>:<account>:certificate/<id>
  subnets: ""          # subnet-aaa,subnet-bbb  (public subnets from terraform output)
  scheme: "internet-facing"
