apiVersion: v1
kind: Service
metadata:
  name: {{ include "microservice.name" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "microservice.name" . }}
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  # NodePort required for both GKE GLB (NEG) and AWS ALB (ip target type)
  type: NodePort
